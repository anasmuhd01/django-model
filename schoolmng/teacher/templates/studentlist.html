<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <header class="bg-info text-light p-2 text-center">
        <h2>Student Management System</h2>
    </header>
    <h1>Student List</h1>
    <a href="{% url 'sadd' %}" class="btn btn-success m-5">Add new student +</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Batch</th>
                <th>Place</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for i in studentlist %}
            <tr>
                <td>{{i.id}}</td>
                <td>{{i.name}}</td>
                <td>{{i.age}}</td>
                <td>{{i.batch}}</td>
                <td>{{i.place}}</td>
                <td>
                    <a class="btn btn-warning" href="{% url 'sedit' %}">UPDATE</a>
                    <a class="btn btn-danger" href="">DELETE</a>
                </td>

            </tr>
            {% endfor %}
        </tbody>
    </table>

    <footer class="bg-info text-light p-2 text-center fixed-bottom">
        <h6>Student Management System @2026</h6>
    </footer>
</body>

</html>
