<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <h1>Update Student</h1>
    <div class="p-5">
        <form action="" method="post">
            {% csrf_token %}
            
            <input type="text" name="name" id="" class="form-control mb-3" value="{{data.name}}">
            <input type=" text" name="age" id="" class="form-control mb-3" value="{{data.age}}">
            <input type="text" name="batch" id="" class="form-control mb-3" value="{{data.batch}}">
            <input type="text" name="place" id="" class="form-control mb-3" value="{{data.place}}">
            
            <div class="d-flex justify-content-between">
                <button class="btn btn-success ">Update</button>
                <a href="{% url 'slist' %}" class="btn btn-danger">Cancel</a>
            </div>


        </form>
    </div>

</body>

</html>
